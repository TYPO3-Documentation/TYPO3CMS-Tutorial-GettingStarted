name: Backport
on:
  pull_request_target:
    types:
      - closed
      - labeled

permissions:
  contents: write
  pull-requests: write

jobs:
  backport:
    uses: TYPO3-Documentation/.github/.github/workflows/reusable-backport.yml@4eb7031cabb7b3efc06a7908a635e2cbd7fef698
    with:
      label_pattern: "^backport (.+)$"
